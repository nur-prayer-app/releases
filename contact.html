<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur — Contact Us</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1b2d 0%, #1a2940 50%, #0f1b2d 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .container {
            max-width: 520px;
            width: 100%;
            margin-top: 2rem;
        }
        .back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 1.5rem;
        }
        .back:hover { color: #e2e8f0; }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.4rem;
        }
        .optional {
            font-weight: 400;
            color: #64748b;
        }
        .type-buttons {
            display: flex;
            gap: 0.5rem;
        }
        .type-btn {
            flex: 1;
            padding: 0.625rem 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .type-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
        }
        .type-btn.active {
            background: rgba(104, 211, 145, 0.1);
            border-color: rgba(104, 211, 145, 0.4);
            color: #68d391;
        }
        textarea, input[type="email"] {
            width: 100%;
            padding: 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s;
        }
        textarea:focus, input[type="email"]:focus {
            border-color: rgba(104, 211, 145, 0.5);
        }
        textarea {
            min-height: 140px;
            resize: vertical;
        }
        textarea::placeholder, input::placeholder {
            color: #475569;
        }
        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0f1b2d;
            background: linear-gradient(135deg, #68d391, #63b3ed);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(104, 211, 145, 0.2);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.2em;
        }
        .status.success { color: #68d391; }
        .status.error { color: #fc8181; }
        .success-card {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(104, 211, 145, 0.2);
            border-radius: 12px;
        }
        .success-card .check {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .success-card h2 {
            font-size: 1.25rem;
            color: #68d391;
            margin-bottom: 0.5rem;
        }
        .success-card p {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="./" class="back">← Back to Nur</a>

        <div id="form-view">
            <h1>Contact Us</h1>
            <p class="subtitle">Bug reports, feature ideas, or anything on your mind — we'd love to hear from you.</p>

            <form id="contact-form">
                <div class="form-group">
                    <label>Type</label>
                    <div class="type-buttons">
                        <button type="button" class="type-btn active" data-type="general">General</button>
                        <button type="button" class="type-btn" data-type="bug">Bug Report</button>
                        <button type="button" class="type-btn" data-type="feature">Feature Request</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Describe the issue or share your idea..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="optional">(optional — if you'd like a reply)</span></label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
                <div class="status" id="status"></div>
            </form>
        </div>

        <div id="success-view" class="hidden">
            <div class="success-card">
                <div class="check">✓</div>
                <h2>Thank you!</h2>
                <p>Your message has been received. We appreciate you reaching out.</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qbyirkzdwzeetdugxyre.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BgBlYMnxPhkWWEtbHNHzIg_h-RkMDda';

        let selectedType = 'general';

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;
            });
        });

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status');
            const message = document.getElementById('message').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!message) { status.textContent = 'Please enter a message.'; status.className = 'status error'; return; }

            btn.disabled = true;
            btn.textContent = 'Sending...';
            status.textContent = '';

            try {
                const resp = await fetch(`${SUPABASE_URL}/rest/v1/contacts`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal',
                    },
                    body: JSON.stringify({
                        type: selectedType,
                        message,
                        email: email || null,
                        app_version: null,
                    }),
                });

                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                document.getElementById('form-view').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
            } catch {
                status.textContent = 'Something went wrong. Please try again.';
                status.className = 'status error';
                btn.disabled = false;
                btn.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
