<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Social Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card {
            width: 1200px;
            height: 630px;
            background: #0f1b2d;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        /* Ambient glow */
        .card::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: rgba(104, 211, 145, 0.12);
            filter: blur(120px);
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: -15%;
            right: -5%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(99, 179, 237, 0.10);
            filter: blur(120px);
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .icon {
            width: 88px;
            height: 88px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .name {
            font-family: 'Poppins', sans-serif;
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #68d391, #63b3ed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 26px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.5px;
        }
        .pills {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .pill {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.04);
        }
        /* Subtle star dots */
        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 12% 8%, rgba(255,255,255,.15), transparent),
                radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.10), transparent),
                radial-gradient(1.2px 1.2px at 75% 6%, rgba(255,255,255,.12), transparent),
                radial-gradient(1px 1px at 80% 45%, rgba(255,255,255,.08), transparent),
                radial-gradient(1px 1px at 18% 65%, rgba(255,255,255,.06), transparent),
                radial-gradient(1.2px 1.2px at 62% 58%, rgba(255,255,255,.10), transparent),
                radial-gradient(1px 1px at 8% 85%, rgba(255,255,255,.10), transparent),
                radial-gradient(1px 1px at 68% 88%, rgba(255,255,255,.06), transparent);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="stars"></div>
        <div class="content">
            <img class="icon" src="icon.png" alt="Nur">
            <div class="name">Nur</div>
            <div class="tagline">A prayer tracker built for Muslims</div>
            <div class="pills">
                <span class="pill">Prayer Times</span>
                <span class="pill">Hijri Calendar</span>
                <span class="pill">Fasting</span>
                <span class="pill">Free &amp; Private</span>
            </div>
        </div>
    </div>
</body>
</html>
