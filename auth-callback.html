<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'">
    <title>Nur — Signed In</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1b2d;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 3rem 2rem;
        }
        .check { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.25rem; color: #68d391; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">&#10003;</div>
        <h1>Signed in successfully</h1>
        <p>You can close this tab and return to Nur.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error_description') || params.get('error');
        if (error) {
            document.querySelector('h1').textContent = 'Sign-in failed';
            document.querySelector('h1').style.color = '#f56565';
            document.querySelector('p').textContent = error;
        } else if (code) {
            window.location.href = 'nur://oauth/callback?code=' + encodeURIComponent(code);
        } else {
            const hash = window.location.hash.substring(1);
            if (hash) {
                window.location.href = 'nur://oauth/callback#' + hash;
            }
        }
    </script>
</body>
</html>
